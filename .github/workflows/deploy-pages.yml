name: Deploy to GitHub Pages

# Publishes the site to GitHub Pages on every push to main. Using a workflow
# (rather than the Settings > Pages "branch" source) also enables Pages via the
# API on first run, so no manual toggle in repo settings is required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages via the API if it isn't already enabled.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the site; index.html sits at the root.
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
